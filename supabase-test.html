<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase CRUD Operations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div class="container mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-bold">Supabase CRUD Operations</h1>
            <button id="dark-mode-toggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700">
                <i class="fas fa-moon dark:hidden"></i>
                <i class="fas fa-sun hidden dark:inline"></i>
            </button>
        </div>

        <!-- Test Section -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold text-center mb-4">Test Section</h2>
            <div class="flex justify-center space-x-4">
                <button id="test-connection" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Test Supabase Connection
                </button>
                <button id="test-query" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded transition duration-200">
                    Test Simple Query
                </button>
            </div>
            <p id="connection-status" class="mt-4 text-center"></p>
        </div>

        <!-- Data Form -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8">
            <h2 class="text-2xl font-bold text-center mb-4">Data Form</h2>
            <form id="data-form" class="space-y-4">
                <input type="hidden" id="id">
                <div>
                    <label for="name" class="block mb-1">Name</label>
                    <input type="text" id="name" placeholder="Enter your name" class="w-full p-3 rounded-lg border dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100" required>
                </div>
                <div>
                    <label for="email" class="block mb-1">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" class="w-full p-3 rounded-lg border dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100" required>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg text-lg transition duration-200">Insert Data</button>
            </form>
        </div>

        <!-- Search Bar -->
        <div class="mb-4">
            <input type="text" id="search-input" placeholder="Search..." class="w-full p-3 rounded-lg border dark:border-gray-700 dark:bg-gray-900 dark:text-gray-100">
        </div>

        <!-- Data Display Section -->
        <div id="data-container" class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8 overflow-x-auto">
            <h2 class="text-2xl font-bold text-center mb-4">Data List</h2>
            <table class="w-full">
                <thead>
                    <tr>
                        <th class="p-2 cursor-pointer" data-sort="id">ID <i class="fas fa-sort"></i></th>
                        <th class="p-2 cursor-pointer" data-sort="name">Name <i class="fas fa-sort"></i></th>
                        <th class="p-2 cursor-pointer" data-sort="email">Email <i class="fas fa-sort"></i></th>
                        <th class="p-2 cursor-pointer" data-sort="created_at">Created At <i class="fas fa-sort"></i></th>
                    </tr>
                </thead>
                <tbody id="data-list"></tbody>
            </table>
            <div id="loading-indicator" class="text-center py-4 hidden">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
            </div>
        </div>

        <!-- Pagination Controls -->
        <div class="flex justify-between items-center mb-8">
            <button id="prev-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-l transition duration-200">
                Previous
            </button>
            <span id="page-info"></span>
            <button id="next-page" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-r transition duration-200">
                Next
            </button>
        </div>
    </div>

    <!-- Import Supabase JS file and handle operations -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        // Initialize Supabase client
        const supabaseUrl = 'https://cflncektpegrccomneqc.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNmbG5jZWt0cGVncmNjb21uZXFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTYzODg3MzQsImV4cCI6MjAzMTk2NDczNH0.YaNGZ3fjFKoGC48PXEpLCZZTjuH10OZqgxgxXKO8le8';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // Pagination state
        let currentPage = 1;
        const limit = 10;  // Number of records to fetch per page
        let totalCount = 0;
        let currentSort = { column: 'created_at', ascending: false };

        // HTML elements
        const dataList = document.getElementById('data-list');
        const dataForm = document.getElementById('data-form');
        const idInput = document.getElementById('id');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submit-btn');
        const testConnectionBtn = document.getElementById('test-connection');
        const testQueryBtn = document.getElementById('test-query');
        const connectionStatus = document.getElementById('connection-status');
        const prevPageBtn = document.getElementById('prev-page');
        const nextPageBtn = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');
        const searchInput = document.getElementById('search-input');
        const loadingIndicator = document.getElementById('loading-indicator');
        const darkModeToggle = document.getElementById('dark-mode-toggle');

        // Function to test Supabase connection
        async function testConnection() {
            try {
                const { count, error } = await supabase.from('thecoffeejesus').select('count', { count: 'exact' });
                if (error) throw error;
                showToast('success', `Connection successful. Total records: ${count}`);
            } catch (error) {
                showToast('error', `Connection failed: ${error.message}`);
            }
        }

        // Function to fetch data from Supabase
        async function fetchData(page = 1, sortColumn = currentSort.column, sortAscending = currentSort.ascending, searchTerm = '') {
            showLoading(true);
            try {
                const start = (page - 1) * limit;
                const end = start + limit - 1;

                let query = supabase
                    .from('thecoffeejesus')
                    .select('*', { count: 'exact' })
                    .order(sortColumn, { ascending: sortAscending })
                    .range(start, end);

                if (searchTerm) {
                    query = query.or(`name.ilike.%${searchTerm}%,email.ilike.%${searchTerm}%`);
                }

                const { data, error, count } = await query;

                if (error) throw error;

                totalCount = count;
                updatePaginationControls();

                dataList.innerHTML = '';
                if (data.length === 0) {
                    showToast('info', 'No data available.');
                } else {
                    data.forEach(item => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td class="p-2">${item.id}</td>
                            <td class="p-2">${item.name}</td>
                            <td class="p-2">${item.email}</td>
                            <td class="p-2">${new Date(item.created_at).toLocaleString()}</td>
                        `;
                        dataList.appendChild(row);
                    });
                }
            } catch (error) {
                showToast('error', `Error: ${error.message}`);
            } finally {
                showLoading(false);
            }
        }

        // Function to handle form submission (Create and Update)
        async function handleFormSubmit(e) {
            e.preventDefault();
            const id = idInput.value;
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            if (!name || !email) {
                showToast('error', 'Please fill in all fields.');
                return;
            }

            try {
                let result;
                if (id) {
                    result = await supabase
                        .from('thecoffeejesus')
                        .update({ name, email })
                        .eq('id', id)
                        .select();
                } else {
                    result = await supabase
                        .from('thecoffeejesus')
                        .insert([{ name, email }])
                        .select();
                }

                if (result.error) throw result.error;

                dataForm.reset();
                idInput.value = '';
                submitBtn.textContent = 'Insert Data';
                showToast('success', 'Operation successful!');
                fetchData(currentPage);
            } catch (error) {
                showToast('error', `Error: ${error.message}`);
            }
        }

        // Function to handle edit button click
        function handleEdit(id) {
            const row = dataList.querySelector(`button[data-id="${id}"]`).closest('tr');
            const [, name, email] = row.querySelectorAll('td');
            
            idInput.value = id;
            nameInput.value = name.textContent.trim();
            emailInput.value = email.textContent.trim();
            submitBtn.textContent = 'Update Data';
        }

        // Function to handle delete button click
        async function handleDelete(id) {
            const result = await Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, delete it!'
            });

            if (result.isConfirmed) {
                try {
                    const { error } = await supabase
                        .from('thecoffeejesus')
                        .delete()
                        .eq('id', id);

                    if (error) throw error;

                    showToast('success', 'Record deleted successfully!');
                    fetchData(currentPage);
                } catch (error) {
                    showToast('error', `Error: ${error.message}`);
                }
            }
        }

        // Function to update pagination controls
        function updatePaginationControls() {
            const totalPages = Math.ceil(totalCount / limit);
            pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
            prevPageBtn.disabled = currentPage === 1;
            nextPageBtn.disabled = currentPage === totalPages;
        }

        // Function to show loading indicator
        function showLoading(isLoading) {
            loadingIndicator.classList.toggle('hidden', !isLoading);
        }

        // Function to show toast notifications
        function showToast(icon, text) {
            Swal.fire({
                icon: icon,
                text: text,
                toast: true,
                position: 'top-end',
                showConfirmButton: false,
                timer: 3000,
                timerProgressBar: true
            });
        }

        // Event Listeners
        dataForm.addEventListener('submit', handleFormSubmit);

        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                fetchData(currentPage);
            }
        });

        nextPageBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(totalCount / limit);
            if (currentPage < totalPages) {
                currentPage++;
                fetchData(currentPage);
            }
        });

        dataList.addEventListener('click', (e) => {
            if (e.target.classList.contains('edit-btn')) {
                handleEdit(e.target.dataset.id);
            } else if (e.target.classList.contains('delete-btn')) {
                handleDelete(e.target.dataset.id);
            }
        });

        testConnectionBtn.addEventListener('click', testConnection);

        testQueryBtn.addEventListener('click', async () => {
            try {
                const { data, error, count } = await supabase
                    .from('thecoffeejesus')
                    .select('*', { count: 'exact' })
                    .limit(5);

                if (error) throw error;

                showToast('success', `Simple query result: ${count} records found. Check console for details.`);
                console.log('Simple query result:', { data, count });
            } catch (error) {
                showToast('error', `Simple query error: ${error.message}`);
            }
        });

        searchInput.addEventListener('input', debounce(() => {
            currentPage = 1;
            fetchData(currentPage, currentSort.column, currentSort.ascending, searchInput.value);
        }, 300));

        document.querySelectorAll('th[data-sort]').forEach(th => {
            th.addEventListener('click', () => {
                const column = th.dataset.sort;
                if (currentSort.column === column) {
                    currentSort.ascending = !currentSort.ascending;
                } else {
                    currentSort = { column, ascending: true };
                }
                fetchData(currentPage, currentSort.column, currentSort.ascending, searchInput.value);
            });
        });

        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // Debounce function for search input
        function debounce(func, delay) {
            let timeoutId;
            return function (...args) {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => func.apply(this, args), delay);
            };
        }

        // Load initial data
        fetchData(currentPage);
    </script>
</body>
</html>
