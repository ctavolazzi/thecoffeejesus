<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Coffee Jesus Blog</title>
    <link rel="stylesheet" href="./blog/styles/blog.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brown: {
                            600: '#8D6E63',
                            700: '#795548',
                            800: '#6D4C41',
                            900: '#5D4037',
                        },
                        cream: {
                            100: '#FFFBF5',
                            200: '#FFF3E0',
                            300: '#FFE0B2',
                        },
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div class="stars-container"></div>
    <div id="navbar-placeholder"></div>
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-12 space-y-8 relative">
        <h1 class="text-4xl font-bold text-center my-4">The Coffee Jesus Blog</h1>
        <div id="blog-posts" class="container mx-auto px-4"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="./blog/js/blog.js"></script>
    <script src="darkMode.js"></script>
    <script>
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
                Array.from(document.getElementById('navbar-placeholder').getElementsByTagName('script')).forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            });

        // Stars generation
        const starsContainer = document.querySelector('.stars-container');
        const starCount = 200;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.width = `${Math.random() * 2}px`;
            star.style.height = star.style.width;
            star.style.left = `${Math.random() * 100}%`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.animationDuration = `${5 + Math.random() * 10}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
